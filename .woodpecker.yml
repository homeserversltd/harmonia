when:
  event:
    - push

skip_clone: true

steps:
  - name: registry-pen-harmonia
    image: python:3.12-alpine
    backend_options:
      docker:
        user: "0"
    when:
      - event: push
        branch: main
    environment:
      KETHER_URL:
        from_secret: KETHER_URL
    commands:
      - |
        set -eu
        KETHER_ENDPOINT="${KETHER_URL:-}"
        KETHER_ENDPOINT="${KETHER_ENDPOINT%/}"
        if [ -z "$KETHER_ENDPOINT" ]; then
          KETHER_ENDPOINT="http://192.168.123.1:7100"
        fi
        export KETHER_ENDPOINT
        python3 - <<'PY'
        import json
        import os
        import sys
        import urllib.error
        import urllib.request

        child_repo = "harmonia"
        endpoint = os.environ["KETHER_ENDPOINT"].rstrip("/")
        payload = {
            "child_repo": child_repo,
            "new_head": os.environ.get("CI_COMMIT_SHA", ""),
            "cause": os.environ.get("CI_PIPELINE_URL", ""),
        }
        request = urllib.request.Request(
            endpoint + "/v1/registry-pen/stamp",
            data=json.dumps(payload).encode("utf-8"),
            headers={"Content-Type": "application/json"},
            method="POST",
        )
        print(f"{child_repo} registry-pen: POST {endpoint}/v1/registry-pen/stamp")
        try:
            with urllib.request.urlopen(request, timeout=1800) as response:
                status = response.status
                raw = response.read()
        except urllib.error.HTTPError as exc:
            status = exc.code
            raw = exc.read()
        print(f"{child_repo} registry-pen: http_status={status}")
        if raw:
            print("response_body first 4096 bytes=")
            sys.stdout.write(raw[:4096].decode("utf-8", errors="replace"))
            print()
        if status < 200 or status >= 300:
            raise SystemExit(f"{child_repo} registry-pen: Kether stamp failed with HTTP {status}")
        print(f"{child_repo} registry-pen: stamped by Kether/Azoth blood lane")
        PY
