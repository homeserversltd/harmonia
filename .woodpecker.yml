when:
  event:
    - push

skip_clone: true

steps:
  - name: registry-pen-harmonia
    image: python:3.12-alpine
    backend_options:
      docker:
        user: "0"
    when:
      - event: push
        branch: main
    environment:
      FORGEJO_TOKEN:
        from_secret: FORGEJO_TOKEN
    commands:
      - |
        set -eu
        TOK=""
        if [ -r /mnt/keyexchange/FORGEJO_TOKEN ]; then
          TOK=$(tr -d '\r\n\t ' < /mnt/keyexchange/FORGEJO_TOKEN)
        fi
        if [ -z "$TOK" ]; then
          TOK=$(printf '%s' "${FORGEJO_TOKEN:-}" | tr -d '\r\n\t ')
        fi
        if [ -z "$TOK" ]; then
          echo "registry-pen-harmonia: Forgejo token missing; /mnt/keyexchange/FORGEJO_TOKEN is absent or empty and env FORGEJO_TOKEN is empty. Fix: run ./cli.py keyman transmit forgejo-token --to homeserver-ci-agent on homeserver."
          exit 1
        fi
        apk add --no-cache git ca-certificates
        git config --global http.sslVerify false
        git config --global credential.helper store
        printf 'https://oauth2:%s@git.home.arpa\n' "$TOK" > ~/.git-credentials
        chmod 600 ~/.git-credentials
        git config --global url."https://git.home.arpa/HOMESERVERSLTD/".insteadOf "git@git.home.arpa:HOMESERVERSLTD/"
        rm -rf /tmp/fulcrum-registry-pen-src
        git clone --depth 1 --branch main https://git.home.arpa/HOMESERVERSLTD/fulcrum.git /tmp/fulcrum-registry-pen-src
        python3 /tmp/fulcrum-registry-pen-src/lib/registry-pen/index.py \
          --child-repo harmonia \
          --new-head "${CI_COMMIT_SHA}" \
          --cause "${CI_PIPELINE_URL}" \
          --fulcrum-remote https://git.home.arpa/HOMESERVERSLTD/fulcrum.git
