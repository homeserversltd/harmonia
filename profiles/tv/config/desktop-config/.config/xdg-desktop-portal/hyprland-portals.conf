[preferred]
# Hyprland owns the Wayland-specific portals; GTK remains the general fallback.
default=hyprland;gtk

# But use KDE/Plasma dialogs where you specifically wanted them.
org.freedesktop.impl.portal.FileChooser=kde
org.freedesktop.impl.portal.AppChooser=kde

# Keep Chromium/other apps using the secret portal backed by KWallet.
org.freedesktop.impl.portal.Secret=kwallet
