bind = SUPER, Q, killactive
bind = SUPER, C, killactive
bind = ALT, Q, killactive
bind = SUPER, F, fullscreen, 0
bind = CTRL ALT, Delete, exec, sh ~/bin/waybar-toggle.sh
bind = CTRL SHIFT, Escape, exec, sh ~/bin/waybar-toggle.sh
bind = ALT, Z, exec, sh ~/bin/waybar-toggle.sh
bind = SUPER, Z, exec, sh ~/bin/waybar-toggle.sh

# Global Alt-Tab: cycle all windows across workspaces/monitors
bind = ALT, TAB, exec, $HOME/bin/alt-tab.sh forward
bind = ALT SHIFT, TAB, exec, $HOME/bin/alt-tab.sh backward

bindle = , XF86AudioRaiseVolume, exec, sh ~/bin/volume.sh up
bindle = , XF86AudioLowerVolume, exec, sh ~/bin/volume.sh down
bindl = , XF86AudioMute, exec, sh ~/bin/volume.sh mute
bind = SUPER, E, exec, dolphin
bind = SUPER, Return, exec, uwsm app -- kitty
bind = SUPER, KP_Enter, exec, uwsm app -- kitty
bind = CTRL ALT, T, exec, uwsm app -- kitty
bind = SUPER, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = SUPER, Space, exec, $HOME/bin/tv-launcher.sh
bind = ALT, Space, exec, $HOME/bin/tv-launcher.sh
bind = SUPER, T, exec, kate
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d
bind = SUPER, H, resizeactive, -20 0
bind = SUPER, L, resizeactive, 20 0
bind = SUPER, K, resizeactive, 0 -20
bind = SUPER, J, resizeactive, 0 20
bind = SUPER CTRL, left, workspace, e-1
bind = SUPER CTRL, right, workspace, e+1
bind = SUPER SHIFT, left, movetoworkspace, e-1
bind = SUPER SHIFT, right, movetoworkspace, e+1
bind = SUPER CTRL SHIFT, left, movetoworkspace, e-1
bind = SUPER CTRL SHIFT, right, movetoworkspace, e+1
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bindm = SUPER SHIFT, mouse:272, resizewindow
