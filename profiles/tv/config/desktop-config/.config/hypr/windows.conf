# Window rules for Hyprland 0.55+ syntax.

# Keep KDE Calculator floating, centered, and pinned above tiled windows.
windowrule {
    name = "kcalc-float-above"
    match:class = "org.kde.kcalc"
    float = true
    center = true
    pin = true
}

# Keep Bitwarden vault and approval pop-ups floating instead of tiled.
windowrule {
    name = "bitwarden-float"
    match:class = "^(Bitwarden|bitwarden)$"
    float = true
    center = true
}

# Keep browser-extension Bitwarden pop-ups floating when their class is browser-owned.
windowrule {
    name = "bitwarden-title-float"
    match:title = "^Bitwarden$"
    float = true
    center = true
}

# Keep the Chrome Bitwarden extension popup floating at map time.
windowrule {
    name = "bitwarden-chrome-extension-float"
    match:class = "^chrome-nngceckbapebfimnlniiiahkandclblb-.*$"
    float = true
    center = true
}

# Bitwarden browser-extension popups become identifiable after map; float them via Hyprland socket events.
exec-once = ~/.config/hypr/scripts/bitwarden-popup-float.sh
