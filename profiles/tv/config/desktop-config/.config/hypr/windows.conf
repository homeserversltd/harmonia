# Bitwarden and calculator float rules: modern Hyprland windowrule syntax.
windowrule = float 1, match:class ^(org\.kde\.kcalc)$
windowrule = center 1, match:class ^(org\.kde\.kcalc)$
windowrule = pin 1, match:class ^(org\.kde\.kcalc)$

windowrule = float 1, match:class ^(Bitwarden|bitwarden)$
windowrule = center 1, match:class ^(Bitwarden|bitwarden)$
windowrule = float 1, match:title ^Bitwarden$
windowrule = center 1, match:title ^Bitwarden$
windowrule = float 1, match:class ^chrome-nngceckbapebfimnlniiiahkandclblb-.*$
windowrule = center 1, match:class ^chrome-nngceckbapebfimnlniiiahkandclblb-.*$
windowrule = float 1, match:initial_class ^chrome-nngceckbapebfimnlniiiahkandclblb-.*$
windowrule = center 1, match:initial_class ^chrome-nngceckbapebfimnlniiiahkandclblb-.*$
