# Window rules for Hyprland 0.55+ syntax.

# Keep KDE Calculator floating, centered, and pinned above tiled windows.
windowrule {
    name = "kcalc-float-above"
    match:class = "org.kde.kcalc"
    float = true
    center = true
    pin = true
}

# Keep Bitwarden vault and approval pop-ups floating instead of tiled.
windowrule {
    name = "bitwarden-float"
    match:class = "^(Bitwarden|bitwarden)$"
    float = true
    center = true
}
