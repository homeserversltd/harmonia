confirm_os_window_close 0
detect_urls yes
open_url_with default
map ctrl+shift+h show_scrollback
scrollback_lines 10000
window_padding_width 5
background_opacity 1
background_image_layout cscaled
map ctrl+= change_font_size all +1
map ctrl+- change_font_size all -1
map PageUp scroll_page_up
map PageDown scroll_page_down
listen_on unix:/tmp/kitty
allow_remote_control yes
font_family MesloLGS NF
map ctrl+shift+t new_tab
map ctrl+enter new_window
mouse_map b4 press grabbed,ungrabbed scroll_line_up
mouse_map b5 press grabbed,ungrabbed scroll_line_down
mouse_map left release ungrabbed copy_to_clipboard
cursor_shape block
enable_audio_bell no
visual_bell_color #ff0000
include ./theme.conf
