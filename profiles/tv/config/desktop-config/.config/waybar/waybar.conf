// -*- mode: jsonc -*-
{
"css": "~/.config/waybar/style.css",
"reload_style_on_change":true,
"mode": "dock",

"position": "bottom",
	"height": 36,
    "spacing": 4, // Gaps between modules (4px)
    "modules-left": [
        "custom/launcher",
        "custom/fetch",
        "wlr/taskbar",
        "hyprland/workspaces"
    ],
    "modules-center": [
        "custom/cpu",
        "custom/temperature",
        "custom/memory",
        "custom/disk"
    ],
    "modules-right": [
        "custom/drives",
        "tray",
        "pulseaudio",
        "custom/power",
        "custom/restart",
        "clock"
    ],
"custom/power": {
  "format": "󰐥",
  "on-click": "notify-send 'Power Button' 'Double-click to power off your system'",
  "on-double-click": "systemctl poweroff",
  "tooltip": false
},
"custom/restart": {
  "format": "󰑓",
  "on-click": "notify-send 'Restart Button' 'Double-click to restart your system'",
  "on-double-click": "systemctl reboot",
  "tooltip": false
},
"custom/launcher": {
        "format": "󱓟",
        "on-click": "$HOME/bin/tv-launcher.sh",
    },
"hyprland/workspaces": {
  "format": "{icon}",
  "on-click": "activate",
        "persistent-workspaces": {
        "1": [],
        "2": [],
        "3": []
        },
         "format-icons": {
            "1": "",
            "2": "",
            "3": "",
            "active": "",
            "default": ""
        },
        "sort-by-number": true
        },
    "custom/cpu": {
        "exec": "$HOME/bin/waybar-meter.sh cpu",
        "return-type": "json",
        "format": "{}",
        "interval": 3,
        "tooltip": true
    },
    "custom/temperature": {
        "exec": "$HOME/bin/waybar-meter.sh temp",
        "return-type": "json",
        "format": "{}",
        "interval": 3,
        "tooltip": true
    },
    "custom/memory": {
        "exec": "$HOME/bin/waybar-meter.sh ram",
        "return-type": "json",
        "format": "{}",
        "interval": 5,
        "tooltip": true
    },
    "custom/disk": {
        "exec": "$HOME/bin/waybar-meter.sh disk",
        "return-type": "json",
        "format": "{}",
        "interval": 30,
        "tooltip": true
    },

    "pulseaudio": {
        "format": "{volume}% {icon}",
        "format-muted": "󰖁",
  "on-click": "$HOME/bin/waybar-app-toggle.sh pavucontrol",
        "scroll-step": 5,
        "format-icons": {
                "default": ["", "󰕾", ""],
                        }
    },
"wlr/taskbar": {
        "format": "{icon}",
        "icon-size": 20,
        "tooltip-format": "{title}",
        "on-click": "activate",
        "on-click-middle": "close"
},
"clock": {
    "format": "{:%H:%M}  ",
    "format-alt": "{:%A, %B %d, %Y (%R)} ",
"tooltip-format": "<tt><span font-size='10pt'>{calendar}</span></tt>",    "calendar": {
                "mode"          : "year",
                "mode-mon-col"  : 3,
                "weeks-pos"     : "right",
                "on-scroll"     : 1,
                "on-click-right": "mode",
                "format": {
"months": "<span color='#6699CC'><b>{}</b></span>",
      "days": "<span color='#F0F0F0'><b>{}</b></span>",
      "weeks": "<span color='#6699CC'><b>W{}</b></span>",
      "weekdays": "<span color='#8FBC8F'><b>{}</b></span>",
      "today": "<span color='#FF8C00'><b><u>{}</u></b></span>"                             }
                },
    "actions":  {
                "on-click-right": "mode",
                "on-click-forward": "tz_up",
                "on-click-backward": "tz_down",
                "on-scroll-up": "shift_up",
                "on-scroll-down": "shift_down"
                }
},
"tray": {
        "icon-size": 21,
        "spacing": 10,
        "show-passive-items":true
        },
"custom/fetch": {
    "format": "",
    "on-click": "$HOME/bin/fetch.sh",
  "return-type": "json",
  "exec": "$HOME/bin/tooltips.sh fetch"
  },
"custom/drives":{
  "format": "󰕓",
  "on-click": "$HOME/bin/waybar-app-toggle.sh gnome-disks",
  "return-type": "json",
  "exec": "$HOME/bin/tooltips.sh usb"
  }
}
