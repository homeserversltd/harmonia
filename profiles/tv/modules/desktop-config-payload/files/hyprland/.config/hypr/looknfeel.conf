# TV appliance look: no borders, no gaps, no rounding, no shadows, no blur, no edge flare.
decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_inactive = false
    blur {
        enabled = false
    }
}
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
animations {
    enabled = false
}
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    resize_on_border = false
    extend_border_grab_area = 0
}
misc {
    animate_manual_resizes = false
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
