input {
    kb_layout = us
    touchpad {
        middle_button_emulation = true
        tap-to-click = true
    }
    sensitivity = 0.3
    scroll_points = 0.5 30
    scroll_factor = 1.6
}

# Touchpad gesture lockdown: no compositor-level touchpad gestures.
# Pinch-to-zoom is also disabled per Chromium/Electron flags below.
gestures {
    workspace_swipe_distance = 0
    workspace_swipe_touch = false
    workspace_swipe_create_new = false
    workspace_swipe_forever = false
}
